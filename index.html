<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Malūno parkas BONUS</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #080f0c;
    --card:    rgba(255,255,255,0.04);
    --border:  rgba(255,255,255,0.09);
    --green:   #4ade80;
    --green-d: rgba(74,222,128,0.15);
    --red:     #f87171;
    --text:    #d1fae5;
    --muted:   #4b7a62;
    --mono:    'Share Tech Mono', monospace;
    --sans:    'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem 4rem;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(74,222,128,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,222,128,.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .page { width: 100%; max-width: 460px; position: relative; z-index: 1; }

  .lang-toggle { display: flex; justify-content: flex-end; margin-bottom: 1.5rem; gap: 0; }
  .lang-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: var(--mono); font-size: .7rem; letter-spacing: .1em; padding: .3rem .75rem; cursor: pointer; transition: all .2s; }
  .lang-btn:first-child { border-radius: 6px 0 0 6px; border-right: none; }
  .lang-btn:last-child  { border-radius: 0 6px 6px 0; }
  .lang-btn.active { background: var(--green-d); border-color: rgba(74,222,128,.5); color: var(--green); }
  .lang-btn:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,.2); }

  header { text-align: center; margin-bottom: 2.2rem; }
  .tag { display: inline-block; font-family: var(--mono); font-size: .65rem; letter-spacing: .14em; color: var(--green); border: 1px solid rgba(74,222,128,.3); border-radius: 99px; padding: .25rem .9rem; margin-bottom: 1rem; }
  h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: .4rem; }
  h1 em { font-style: normal; color: var(--green); }
  .sub { font-size: .85rem; color: var(--muted); line-height: 1.5; }

  .fields { display: flex; flex-direction: column; gap: .65rem; margin-bottom: 1.4rem; }
  .field { display: grid; grid-template-columns: 90px 1fr; align-items: center; gap: .75rem; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: .75rem 1rem; transition: border-color .2s; }
  .field:focus-within { border-color: rgba(74,222,128,.4); }
  .field.ok  { border-color: rgba(74,222,128,.6); background: rgba(74,222,128,.05); }
  .field.err { border-color: rgba(248,113,113,.5); animation: shake .3s ease; }
  .gc-id { font-family: var(--mono); font-size: .7rem; color: var(--green); letter-spacing: .06em; }
  input { background: none; border: none; outline: none; color: var(--text); font-family: var(--mono); font-size: .9rem; width: 100%; letter-spacing: .05em; }
  input::placeholder { color: var(--muted); }
  .field.ok  input { color: var(--green); }
  .field.err input { color: var(--red); }
  .tick { display: none; margin-left: auto; color: var(--green); font-size: .85rem; }
  .field.ok .tick { display: block; }

  .btn { width: 100%; padding: .85rem; background: var(--green-d); border: 1.5px solid rgba(74,222,128,.5); border-radius: 10px; color: var(--green); font-family: var(--sans); font-weight: 700; font-size: .95rem; letter-spacing: .04em; cursor: pointer; transition: all .2s; margin-bottom: .6rem; }
  .btn:hover:not(:disabled) { background: rgba(74,222,128,.22); box-shadow: 0 0 24px rgba(74,222,128,.15); }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .hint-line { text-align: center; font-family: var(--mono); font-size: .68rem; color: var(--muted); min-height: 1em; transition: color .2s; }
  .hint-line.warn { color: #fbbf24; }

  #reward { margin-top: 1.8rem; display: none; flex-direction: column; gap: .9rem; animation: rise .5s cubic-bezier(.34,1.56,.64,1) both; }
  #reward.show { display: flex; }
  .r-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem 1.3rem; backdrop-filter: blur(10px); }
  .r-label { font-family: var(--mono); font-size: .63rem; letter-spacing: .14em; color: var(--green); margin-bottom: .7rem; display: flex; align-items: center; gap: .5rem; }
  .r-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(74,222,128,.3), transparent); }
  .coords { font-family: var(--mono); font-size: 1.55rem; color: #fff; letter-spacing: .04em; word-break: break-all; }
  .coords b { color: var(--green); font-weight: 400; }
  .copy-btn { margin-top: .7rem; background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: var(--mono); font-size: .68rem; padding: .28rem .7rem; cursor: pointer; transition: all .2s; }
  .copy-btn:hover { color: var(--green); border-color: rgba(74,222,128,.4); }
  .hint-box { font-size: .9rem; color: #fef3c7; font-style: italic; line-height: 1.7; }

  @keyframes shake { 0%,100%{ transform:translateX(0) } 20%{ transform:translateX(-5px) } 50%{ transform:translateX(5px) } 80%{ transform:translateX(-3px) } }
  @keyframes rise { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
  .confetti-p { position: fixed; top: -10px; pointer-events: none; z-index: 9999; animation: fall linear forwards; border-radius: 2px; }
  @keyframes fall { to { transform: translateY(110vh) rotate(600deg); opacity: 0; } }
</style>
</head>
<body>
<div class="page">

  <div class="lang-toggle">
    <button class="lang-btn active" id="lang-lt" onclick="setLang('lt')">LT</button>
    <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
  </div>

  <header>
    <h1 id="title-h1">Malūno parko <em>BONUS</em></h1>
    <p class="sub" data-i18n="sub">Įveskite slapą kodą, rastą prie kiekvieno lobio, kad atrakintumėte bonus.</p>
  </header>

  <div class="fields" id="fields">
    <div class="field" id="f0"><span class="gc-id">GCBBW8B</span><input id="i0" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" data-secret="4563" data-i18n-ph="placeholder"/><span class="tick">✓</span></div>
    <div class="field" id="f1"><span class="gc-id">GCBC1QM</span><input id="i1" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" data-secret="2389" data-i18n-ph="placeholder"/><span class="tick">✓</span></div>
    <div class="field" id="f2"><span class="gc-id">GCBC1B3</span><input id="i2" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" data-secret="4352" data-i18n-ph="placeholder"/><span class="tick">✓</span></div>
    <div class="field" id="f3"><span class="gc-id">GCBBVKQ</span><input id="i3" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" data-secret="1256" data-i18n-ph="placeholder"/><span class="tick">✓</span></div>
    <div class="field" id="f4"><span class="gc-id">GCBBZDN</span><input id="i4" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" data-secret="9753" data-i18n-ph="placeholder"/><span class="tick">✓</span></div>
  </div>

  <button class="btn" id="btn" disabled>🔒 <span data-i18n="btn-locked">Atrakinti papildomą lobį</span></button>
  <p class="hint-line" id="hint" data-i18n="hint-fill">Užpildykite visus šešis laukus</p>

  <div id="reward">

    <div class="r-card">
      <div class="r-label">📍 <span data-i18n="label-coords">GALUTINĖS KOORDINATĖS</span></div>
      <div class="coords"><b>N</b> 55° 42.376 &nbsp;<b>E</b> 021° 09.295</div>
      <button class="copy-btn" id="copy-btn">📋 <span data-i18n="copy">Kopijuoti</span></button>
    </div>

    <div class="r-card">
      <div class="r-label">💡 <span data-i18n="label-hint">LOBIO UŽUOMINA</span></div>
      <p class="hint-box" data-i18n="hint-text">Atsargiai lipdami į medį kąŽką turėtumėte pamatyti mažo.</p>
    </div>

  </div>

</div>

<script>
const translations = {
  lt: {
    sub:          'Įveskite slapą kodą, rastą prie kiekvieno lobio, kad atrakintumėte bonus.',
    placeholder:  'slaptas kodas…',
    'btn-locked': 'Atrakinti BONUS',
    'btn-ready':  'Atrakinti BONUS',
    'btn-done':   '✅ BONUS atrakintas',
    'hint-fill':  'Užpildykite visus penkis laukus',
    'hint-ready': 'Visi kodai teisingi — paspauskite atrakinti!',
    'hint-wrong': 'Vienas ar keli kodai neteisingi',
    'hint-fail':  '⚠ Kodai nesutampa — bandykite dar kartą',
    'label-coords':'GALUTINĖS KOORDINATĖS',
    'label-hint': 'LOBIO UŽUOMINA',
    'hint-text':  'Atsargiai lipdami į medį kąŽką turėtumėte pamatyti mažo.',
    copy:         'Kopijuoti',
    copied:       '✅ Nukopijuota!',
  },
  en: {
    sub:          'Enter the secret code found at each cache to unlock the bonus.',
    placeholder:  'secret code…',
    'btn-locked': 'Unlock Bonus Cache',
    'btn-ready':  'Unlock Bonus Cache',
    'btn-done':   '✅ Bonus Unlocked',
    'hint-fill':  'Fill all five fields to continue',
    'hint-ready': 'All codes correct — tap unlock!',
    'hint-wrong': 'One or more codes are wrong',
    'hint-fail':  '⚠ Codes do not match — try again',
    'label-coords':'FINAL COORDINATES',
    'label-hint': 'CACHE HINT',
    'hint-text':  'If you carefully climb the tree you will see something small.',
    copy:         'Copy',
    copied:       '✅ Copied!',
  }
};

let currentLang = 'lt';
function t(key) { return translations[currentLang][key] || key; }

function applyTranslations() {
  document.documentElement.lang = currentLang;
  const titleEl = document.getElementById('title-h1');
  if (currentLang === 'lt') titleEl.innerHTML = 'Malūno parko <em>BONUS</em>';
  else                       titleEl.innerHTML = 'Malūno parkas <em>BONUS</em>';
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = t('placeholder'); });
  document.getElementById('lang-lt').classList.toggle('active', currentLang === 'lt');
  document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
  refreshButton();
  if ($('btn').textContent.includes('✅')) $('btn').textContent = t('btn-done');
  const copyBtn = $('copy-btn');
  if (!copyBtn.textContent.includes('✅')) copyBtn.innerHTML = '📋 ' + t('copy');
}

function setLang(lang) {
  currentLang = lang;
  try { localStorage.setItem('gc_lang', lang); } catch(e) {}
  applyTranslations();
}

const NS = 'gcbqexf';
const hitFound  = () => fetch(`https://api.counterapi.dev/v1/${NS}/found/up`).catch(()=>{});
const hitFailed = () => fetch(`https://api.counterapi.dev/v1/${NS}/failed/up`).catch(()=>{});
const CACHE_KEY = 'gc_bonus_v1';
const $ = id => document.getElementById(id);
const inputs = [0,1,2,3,4].map(i => $(`i${i}`));
const cards  = [0,1,2,3,4].map(i => $(`f${i}`));

function getSecret(i) { return inputs[i].dataset.secret.trim().toUpperCase(); }
function getVal(i)    { return inputs[i].value.trim().toUpperCase(); }
function allFilled()  { return inputs.every(inp => inp.value.trim() !== ''); }
function allCorrect() { return inputs.every((_, i) => getVal(i) === getSecret(i)); }

inputs.forEach((inp, i) => {
  inp.addEventListener('blur', () => {
    if (!inp.value.trim()) { cards[i].className = 'field'; return; }
    cards[i].className = getVal(i) === getSecret(i) ? 'field ok' : 'field err';
    if (cards[i].classList.contains('err')) { cards[i].style.animation='none'; void cards[i].offsetWidth; cards[i].style.animation=''; }
    refreshButton();
  });
  inp.addEventListener('input', () => {
    if (cards[i].classList.contains('err') && getVal(i) === getSecret(i)) cards[i].className = 'field ok';
    refreshButton();
  });
  inp.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    if (i < 4) inputs[i+1].focus();
    else if (allCorrect()) $('btn').click();
  });
});

function refreshButton() {
  const btn = $('btn'), hintEl = $('hint');
  if ($('reward').classList.contains('show')) return;
  const correct = allCorrect(), filled = allFilled();
  if (correct) { btn.disabled=false; btn.innerHTML='🔓 '+t('btn-ready'); hintEl.textContent=t('hint-ready'); hintEl.className='hint-line warn'; }
  else if (filled) { btn.disabled=true; btn.innerHTML='🔒 '+t('btn-locked'); hintEl.textContent=t('hint-wrong'); hintEl.className='hint-line warn'; }
  else { btn.disabled=true; btn.innerHTML='🔒 '+t('btn-locked'); hintEl.textContent=t('hint-fill'); hintEl.className='hint-line'; }
}

$('btn').addEventListener('click', () => {
  if (!allCorrect()) { hitFailed(); $('hint').textContent=t('hint-fail'); $('hint').className='hint-line warn'; return; }
  unlock();
});

function unlock(skipConfetti) {
  try { if (!localStorage.getItem(CACHE_KEY)) hitFound(); localStorage.setItem(CACHE_KEY,'1'); } catch(e){ hitFound(); }
  $('btn').disabled=true; $('btn').textContent=t('btn-done'); $('hint').textContent='';
  $('reward').classList.add('show');
  setTimeout(() => $('reward').scrollIntoView({behavior:'smooth',block:'start'}), 300);
  if (!skipConfetti) confetti();
}

$('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText('N 55° 42.376  E 021° 09.295')
    .then(() => { $('copy-btn').textContent=t('copied'); setTimeout(()=>{ $('copy-btn').innerHTML='📋 '+t('copy'); },2000); });
});

function confetti() {
  const colours = ['#4ade80','#fde047','#ffffff','#86efac','#00e5ff'];
  for (let i=0;i<60;i++) {
    const p=document.createElement('div'); p.className='confetti-p';
    const size=5+Math.random()*7;
    p.style.cssText=`left:${Math.random()*100}vw;width:${size}px;height:${size}px;background:${colours[Math.random()*colours.length|0]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*1.5}s;animation-delay:${Math.random()*.4}s;`;
    document.body.appendChild(p); p.addEventListener('animationend',()=>p.remove());
  }
}

try { const saved=localStorage.getItem('gc_lang'); if (saved==='en'||saved==='lt') currentLang=saved; } catch(e) {}
applyTranslations();
try {
  if (localStorage.getItem(CACHE_KEY)) {
    inputs.forEach((inp,i)=>{ inp.value=inp.dataset.secret; cards[i].className='field ok'; });
    refreshButton(); unlock(true);
  }
} catch(e) {}
</script>
</body>
</html>
